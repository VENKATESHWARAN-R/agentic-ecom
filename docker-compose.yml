services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    # No published port — reachable only via the Next BFF on the compose network (P4/P7).
    expose:
      - "8000"
    environment:
      AGENT_MODEL: ${AGENT_MODEL:-${COPILOTKIT_MODEL:-anthropic:claude-sonnet-4-6}}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN:-http://localhost:3000}
      # Shared secret for the BFF→backend identity assertion (must match voltti).
      INTERNAL_JWT_SECRET: ${INTERNAL_JWT_SECRET:-dev-only-insecure-internal-secret-change-me}
      # Input-safety guard (P3): the backend screens each user message here before
      # running the agent. Fail-open by default — a guard outage doesn't take chat down.
      GUARD_ENABLED: ${GUARD_ENABLED:-true}
      GUARD_URL: http://guard:8001
      GUARD_FAIL_OPEN: ${GUARD_FAIL_OPEN:-true}
      # Observability (P7): unset → telemetry stays local; set → export to Logfire.
      LOGFIRE_TOKEN: ${LOGFIRE_TOKEN:-}
    depends_on:
      - guard

  # Input-safety service (P3): a standalone Prompt Guard classifier. Separate so
  # its heavy ML deps (torch/transformers) stay out of the agent backend and it can
  # be upgraded/scaled/disabled on its own. Internal only — never published.
  guard:
    build:
      context: ./guard
      secrets:
        - hf_token
    expose:
      - "8001"
    environment:
      GUARD_MODEL_ID: ${GUARD_MODEL_ID:-meta-llama/Llama-Prompt-Guard-2-22M}
      GUARD_THRESHOLD: ${GUARD_THRESHOLD:-0.5}
      LOGFIRE_TOKEN: ${LOGFIRE_TOKEN:-}

  voltti:
    build:
      context: .
      dockerfile: Dockerfile
    # No published port — only the edge (nginx) is exposed to the host (P7).
    expose:
      - "3000"
    environment:
      PORT: 3000
      # Server-side: reach the backend over the compose network.
      AGENT_URL: http://backend:8000/agui
      # BFF proxy → backend REST (server-side; browser uses the same-origin /api/bff).
      BACKEND_URL: http://backend:8000
      # Shared secret for the BFF→backend identity assertion (must match backend).
      INTERNAL_JWT_SECRET: ${INTERNAL_JWT_SECRET:-dev-only-insecure-internal-secret-change-me}
      COPILOTKIT_TELEMETRY_DISABLED: ${COPILOTKIT_TELEMETRY_DISABLED:-false}
    depends_on:
      - backend

  # Edge / single ingress (P7): TLS termination, per-IP rate limits, size/timeout
  # caps, basic hardening. The only service published to the host.
  edge:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
      # - "443:443"   # enable with the TLS block in deploy/nginx/voltti.conf
    volumes:
      - ./deploy/nginx/voltti.conf:/etc/nginx/conf.d/default.conf:ro
      # - ./deploy/nginx/certs:/etc/nginx/certs:ro   # mount certs for TLS
    depends_on:
      - voltti

# HF token for the gated Prompt Guard weights — used only as a build secret for the
# guard image (baked weights, never a layer). Reads from the HF_TOKEN env / .env.
secrets:
  hf_token:
    environment: HF_TOKEN
