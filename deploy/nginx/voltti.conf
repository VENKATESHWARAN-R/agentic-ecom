# Voltti edge (P7) — the single public ingress.
# TLS termination, per-IP rate limiting, request size/timeout caps, and basic
# hardening. The backend is NEVER fronted here: the browser only reaches the
# Next.js BFF (which talks to the backend internally over the compose network),
# so the backend has no published port at all.
#
# This terminates plain HTTP on :80 for the local demo. For production, enable
# the TLS server block at the bottom and drop in a certificate (self-signed is
# fine for a demo:
#   openssl req -x509 -newkey rsa:2048 -nodes -days 365 \
#     -keyout certs/voltti.key -out certs/voltti.crt -subj "/CN=localhost")

# Per-IP rate-limit zones — real client IPs are visible here at the edge.
limit_req_zone $binary_remote_addr zone=perip:10m rate=60r/m;   # general browsing/API
limit_req_zone $binary_remote_addr zone=chat:10m  rate=20r/m;   # expensive LLM endpoint
limit_conn_zone $binary_remote_addr zone=conns:10m;
limit_req_status 429;
limit_conn_status 429;

server {
    listen 80;
    server_name _;

    # --- hardening (P7) ---
    server_tokens off;                 # don't advertise the nginx version
    client_max_body_size 256k;         # chat/JSON payloads are small; cap uploads
    client_body_timeout 10s;
    client_header_timeout 10s;
    send_timeout 30s;
    limit_conn conns 20;               # concurrent connections per IP

    # Only the methods the app uses (a crude WAF rule).
    if ($request_method !~ ^(GET|POST|DELETE|HEAD|OPTIONS)$) {
        return 405;
    }

    # The LLM/chat endpoint gets the tighter limit (denial-of-wallet at the edge).
    location /api/copilotkit {
        limit_req zone=chat burst=10 nodelay;
        proxy_pass http://voltti:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_read_timeout 120s;       # streaming (SSE) responses
        proxy_buffering off;           # stream tokens through promptly
    }

    # Everything else → the Next.js storefront / BFF.
    location / {
        limit_req zone=perip burst=20 nodelay;
        proxy_pass http://voltti:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_read_timeout 60s;
    }
}

